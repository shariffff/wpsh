---
- name: Create sudo group
  ansible.builtin.group:
    name: sudo
    state: present

- name: Configure sudoers
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    regexp: '^%sudo'
    line: '%sudo ALL=(ALL:ALL) ALL'
    validate: /usr/sbin/visudo -cf %s

- name: Create wp-sh user
  ansible.builtin.user:
    name: wp-sh
    groups: sudo
    shell: /bin/bash
    create_home: true
    state: present

- name: Set up authorized key for wp-sh
  ansible.posix.authorized_key:
    user: wp-sh
    key: "{{ lookup('file', wp-sh_ssh_key) if wp-sh_ssh_key is match('.*\\.(pub|pem)$') or wp-sh_ssh_key.startswith('~') or wp-sh_ssh_key.startswith('/') else wp-sh_ssh_key }}"
    state: present
    manage_dir: true

- name: Configure sudoers for wp-sh
  ansible.builtin.copy:
    dest: /etc/sudoers.d/00-wp-sh
    content: 'wp-sh ALL=(ALL) NOPASSWD: ALL'
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
